<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Pawse · 抓舞机</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FAF8F4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Pawse">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --cream:      #FBF7EF;
  --cream2:     #F4EDE0;
  --tan:        #C9B99A;
  --tan-light:  #E8DECE;
  --brown:      #8B6F47;
  --brown-dark: #3D2B1F;
  --blue:       #A8C8D8;
  --blue-light: #D6EAF2;
  --blue-mid:   #7BAFC4;
  --pink:       #E8A9A0;
  --pink-soft:  #F6E2DD;
  --pink-mid:   #DD8E84;
  --muted:      #9E8B78;
  --danger:     #C0614A;
  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-sans:  'DM Sans', system-ui, sans-serif;
  --radius:     8px;
  --border:     1px solid var(--tan);
}

html, body {
  height: 100%;
  background: var(--cream);
  color: var(--brown-dark);
  font-family: var(--font-sans);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Screens ── */
.screen {
  position: fixed; inset: 0;
  background: var(--cream);
  display: flex; flex-direction: column;
  transition: opacity .3s, transform .3s;
}
.screen.hidden { opacity: 0; pointer-events: none; transform: translateY(12px); }

/* ══════════════════════════════
   HOME SCREEN
══════════════════════════════ */
#screen-home { overflow-y: auto; }

.home-header {
  padding: 48px 32px 22px;
  border-bottom: var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.home-header-text h1 {
  font-family: var(--font-serif);
  font-size: 30px;
  font-weight: 400;
  color: var(--brown-dark);
  line-height: 1.1;
  letter-spacing: -0.3px;
}

.home-header-text p {
  margin-top: 5px;
  color: var(--muted);
  font-size: 14px;
  font-weight: 300;
}

/* Language toggle */
.lang-btn {
  flex-shrink: 0;
  margin-top: 4px;
  padding: 6px 12px;
  background: var(--cream2);
  border: var(--border);
  border-radius: 20px;
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 500;
  color: var(--brown);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.lang-btn:hover { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-mid); }

/* Empty state */
#empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px;
  gap: 18px;
  text-align: center;
}

.empty-icon {
  width: 88px; height: 88px;
  border: 1.5px solid var(--blue);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 38px;
  background: var(--pink-soft);
  animation: dog-bounce 1.8s ease-in-out infinite;
}

@keyframes dog-bounce {
  0%, 100% { transform: translateY(0) rotate(-3deg); }
  50%      { transform: translateY(-8px) rotate(3deg); }
}

/* Small dog in the title — handled by emoji in text, no extra style needed */

.empty-state-text h2 {
  font-family: var(--font-serif);
  font-size: 20px;
  font-weight: 400;
  color: var(--brown-dark);
}
.empty-state-text p {
  margin-top: 6px;
  font-size: 14px;
  color: var(--muted);
  font-weight: 300;
  font-style: italic;
}

/* Project list */
#project-list-wrap { flex: 1; overflow-y: auto; display: none; }

.list-section-label {
  padding: 20px 32px 8px;
  font-size: 11px;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  font-weight: 500;
}

.project-item {
  display: flex;
  align-items: center;
  padding: 14px 32px;
  border-bottom: var(--border);
  gap: 14px;
  cursor: pointer;
  transition: background .15s;
}
.project-item:hover { background: var(--cream2); }

.project-thumb {
  width: 48px; height: 36px;
  background: var(--blue-light);
  border-radius: 5px;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  border: var(--border);
}

.project-info { flex: 1; min-width: 0; }

.project-name {
  font-size: 15px;
  font-weight: 500;
  color: var(--brown-dark);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.project-name-input {
  font-size: 15px;
  font-weight: 500;
  color: var(--brown-dark);
  font-family: var(--font-sans);
  background: transparent;
  border: none;
  border-bottom: 1.5px solid var(--blue-mid);
  outline: none;
  width: 100%;
  padding: 1px 0;
}

.project-meta {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
  font-weight: 300;
}

.project-actions {
  display: flex; gap: 6px; flex-shrink: 0;
}

.icon-btn {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border: var(--border);
  border-radius: 6px;
  background: transparent;
  cursor: pointer;
  font-size: 14px;
  color: var(--muted);
  transition: all .15s;
}
.icon-btn:hover { background: var(--cream2); color: var(--brown); border-color: var(--brown); }
.icon-btn.danger:hover { color: var(--danger); border-color: var(--danger); background: #fdf0ee; }

/* FAB */
.fab {
  position: fixed;
  bottom: 32px; right: 32px;
  display: flex; align-items: center; gap: 8px;
  padding: 13px 22px;
  background: var(--brown-dark);
  color: var(--cream);
  border: none;
  border-radius: 40px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(61,43,31,0.2);
  transition: transform .15s, box-shadow .15s;
  z-index: 100;
}
.fab:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(221,142,132,0.35); }
.fab:active { transform: translateY(0); }

/* ══════════════════════════════
   PLAYER SCREEN
══════════════════════════════ */
#screen-player { background: var(--cream); }

.player-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 20px;
  border-bottom: var(--border);
  flex-shrink: 0;
  background: var(--cream);
}

.back-btn {
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  border: var(--border);
  border-radius: 7px;
  background: transparent;
  cursor: pointer;
  font-size: 16px;
  color: var(--brown);
  transition: background .15s;
  flex-shrink: 0;
}
.back-btn:hover { background: var(--cream2); }

#player-title {
  flex: 1;
  font-family: var(--font-serif);
  font-size: 17px;
  font-weight: 400;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* player lang btn */
.player-lang-btn {
  flex-shrink: 0;
  padding: 5px 10px;
  background: var(--cream2);
  border: var(--border);
  border-radius: 16px;
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 500;
  color: var(--brown);
  cursor: pointer;
  transition: all .15s;
}
.player-lang-btn:hover { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-mid); }

/* Player body */
.player-body { flex: 1; display: flex; overflow: hidden; }

.video-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 10px;
  gap: 8px;
  min-width: 0;
}

.video-wrap {
  flex: 1;
  background: #1a1410;
  border-radius: var(--radius);
  border: var(--border);
  position: relative;
  overflow: hidden;
  min-height: 300px;
}

/* CSS pseudo-fullscreen (works on iOS, keeps our mirror transform) */
.video-wrap.css-fullscreen {
  position: fixed;
  inset: 0;
  z-index: 9999;
  width: 100vw; height: 100vh;
  border: none;
  border-radius: 0;
  margin: 0;
}
.video-wrap.css-fullscreen .fs-exit { display: flex; }
body.fs-lock { overflow: hidden; }

/* Exit button shown only in CSS fullscreen */
.fs-exit {
  position: absolute;
  top: calc(env(safe-area-inset-top, 0px) + 14px);
  right: calc(env(safe-area-inset-right, 0px) + 14px);
  width: 40px; height: 40px;
  display: none;
  align-items: center; justify-content: center;
  background: rgba(26,20,16,0.55);
  backdrop-filter: blur(4px);
  border: 1.5px solid rgba(250,247,239,0.5);
  border-radius: 50%;
  color: var(--cream);
  cursor: pointer;
  z-index: 10000;
}
.fs-exit:active { transform: scale(.92); }

/* True fullscreen (desktop) — keep video centered & mirror intact */
.video-wrap:fullscreen { border: none; border-radius: 0; }
.video-wrap:-webkit-full-screen { border: none; border-radius: 0; }

#render-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: none; }
#vid {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: contain;
  display: none;
  background: #1a1410;
}
#vid.native-visible { display: block; }
#vid.native-mirrored { transform: scaleX(-1); }

/* Center play/pause overlay */
.overlay-play {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 64px; height: 64px;
  display: none;
  align-items: center; justify-content: center;
  background: rgba(26,20,16,0.42);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  border: 1.5px solid rgba(250,247,239,0.4);
  border-radius: 50%;
  color: #fff;
  cursor: pointer;
  z-index: 6;
  transition: opacity .3s, transform .15s, background .15s;
  padding-left: 3px; /* optical centering for play triangle */
}
.video-wrap.has-video .overlay-play { display: flex; }
.overlay-play:active { transform: translate(-50%, -50%) scale(0.92); }
/* Auto-fade when playing; reappears on tap (toggled via .controls-hidden) */
.video-wrap.playing.controls-hidden .overlay-play { opacity: 0; pointer-events: none; }
.overlay-play .icon-pause { padding-right: 3px; }

/* Top-right overlay tools */
.overlay-tools {
  position: absolute;
  top: 10px; right: 10px;
  display: none;
  gap: 8px;
  z-index: 7;
}
.video-wrap.has-video .overlay-tools { display: flex; }
.overlay-btn {
  width: 38px; height: 38px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(26,20,16,0.42);
  -webkit-backdrop-filter: blur(6px);
  backdrop-filter: blur(6px);
  border: 1.5px solid rgba(250,247,239,0.35);
  border-radius: 50%;
  color: #fff;
  cursor: pointer;
  font-size: 17px;
  transition: transform .12s, background .15s;
}
.overlay-btn:active { transform: scale(0.9); }
.overlay-btn.active { background: rgba(123,175,196,0.75); border-color: #fff; }

#load-status {
  position: absolute; inset: 0;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  padding: 24px;
  text-align: center;
  color: var(--cream);
  font-size: 14px;
  line-height: 1.6;
}
#load-status.show { display: flex; }
#load-status .ls-spinner {
  width: 28px; height: 28px;
  border: 3px solid rgba(250,248,244,0.25);
  border-top-color: var(--cream);
  border-radius: 50%;
  animation: ls-spin 0.8s linear infinite;
}
@keyframes ls-spin { to { transform: rotate(360deg); } }
/* Dancing dog loader (emoji) */
#load-status .ls-dog {
  font-size: 44px;
  line-height: 1;
  animation: dog-wiggle 0.6s ease-in-out infinite;
}
@keyframes dog-wiggle {
  0%, 100% { transform: rotate(-8deg) translateY(0); }
  50%      { transform: rotate(8deg) translateY(-6px); }
}
#load-status .ls-hint { font-size: 13px; opacity: 0.7; max-width: 260px; }

/* Loading progress bar */
#load-status .ls-bar {
  width: 160px;
  height: 6px;
  background: rgba(250,247,239,0.2);
  border-radius: 3px;
  overflow: hidden;
  margin-top: 2px;
}
#load-status .ls-bar-fill {
  height: 100%;
  width: 0%;
  background: var(--blue);
  border-radius: 3px;
  transition: width .25s ease;
}
/* Indeterminate sweep when we don't know exact progress */
#load-status .ls-bar.indeterminate .ls-bar-fill {
  width: 40%;
  animation: ls-sweep 1.1s ease-in-out infinite;
}
@keyframes ls-sweep {
  0%   { margin-left: -40%; }
  100% { margin-left: 100%; }
}

/* Timeline */
.timeline-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
  position: absolute;
  left: 0; right: 0; bottom: 0;
  z-index: 6;
  padding: 24px 14px 10px;
  background: linear-gradient(to top, rgba(20,16,12,0.55), rgba(20,16,12,0));
  transition: opacity .3s, transform .3s;
}
/* auto-hide with the other controls while playing */
.video-wrap.playing.controls-hidden .timeline-wrap {
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
}

.time-row {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  color: rgba(255,255,255,0.85);
  font-variant-numeric: tabular-nums;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

.loop-badge { font-size: 11px; color: var(--blue-light); display: none; }
.loop-badge.show { display: block; }

.tl-container { position: relative; height: 30px; }

.tl-track {
  position: absolute;
  top: 14px; left: 0; right: 0;
  height: 8px;
  background: rgba(255,255,255,0.28);
  border-radius: 4px;
  cursor: pointer;
  overflow: hidden;
}

.tl-buffered { position: absolute; left:0; top:0; height:100%; background: rgba(255,255,255,0.35); border-radius:4px; pointer-events:none; }
.tl-played   { position: absolute; left:0; top:0; height:100%; background: var(--blue); border-radius:4px; pointer-events:none; }

.loop-zone {
  position: absolute; top:0; height:100%;
  background: rgba(168,200,216,0.45);
  border-radius: 4px;
  pointer-events: none;
  display: none;
}

.scrub-handle {
  position: absolute;
  top: 3px;
  width: 30px; height: 30px;
  background: var(--cream);
  border: 2.5px solid var(--brown);
  border-radius: 50%;
  transform: translateX(-50%);
  cursor: grab;
  z-index: 10;
  box-shadow: 0 1px 5px rgba(61,43,31,0.25);
  transition: border-color .15s, transform .1s, background .15s;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--brown);
}
.scrub-handle svg { display: block; pointer-events: none; }
.scrub-handle:active {
  cursor: grabbing;
  border-color: var(--blue-mid);
  background: var(--blue-light);
  color: var(--blue-mid);
  transform: translateX(-50%) scale(1.15) rotate(-8deg);
}

.loop-handle {
  position: absolute;
  top: 4px;
  width: 22px; height: 22px;
  border-radius: 50%;
  cursor: ew-resize;
  z-index: 11;
  display: none;
  transform: translateX(-50%);
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  box-shadow: 0 1px 4px rgba(0,0,0,0.35);
  border: 2px solid rgba(255,255,255,0.7);
}
.loop-handle.show { display: flex; }
#loop-in-handle  { background: var(--blue-mid); }
#loop-out-handle { background: var(--danger); }
#loop-in-handle:active, #loop-out-handle:active { transform: translateX(-50%) scale(1.2); }

/* Controls */
.controls-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
}

.ctrl-btn {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  border: var(--border);
  border-radius: 9px;
  cursor: pointer;
  font-size: 16px;
  color: var(--brown-dark);
  transition: background .15s, border-color .15s, transform .1s;
  flex-shrink: 0;
}
.ctrl-btn svg { display: block; }
.ctrl-btn:hover { background: var(--cream2); border-color: var(--brown); }
.ctrl-btn:active { transform: scale(.94); }
.ctrl-btn.active { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-mid); }

.play-btn {
  width: 52px !important; height: 52px !important;
  background: var(--brown-dark) !important;
  border-color: var(--brown-dark) !important;
  color: var(--cream) !important;
  border-radius: 50% !important;
}
.play-btn:hover { opacity: .85; background: var(--brown-dark) !important; }

.sep { width: 1px; height: 22px; background: var(--tan); flex-shrink: 0; }

/* Speed row — centered under the controls */
/* Tool trigger row (collapsed speed / loop) */
.tool-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-top: 4px;
}
.tool-trigger {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--cream);
  border: var(--border);
  border-radius: 20px;
  color: var(--brown-dark);
  font-size: 13px;
  font-weight: 500;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all .15s;
}
.tool-trigger:active { transform: scale(.96); }
.tool-trigger.open { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-mid); }
.tool-trigger.loop-active { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-mid); }
.tool-trigger svg { display: block; }

/* Popover panels */
.tool-pop {
  margin-top: 8px;
  padding: 12px;
  background: var(--cream2);
  border: var(--border);
  border-radius: 12px;
  animation: pop-in .18s ease;
}
@keyframes pop-in {
  from { opacity: 0; transform: translateY(-6px); }
  to   { opacity: 1; transform: translateY(0); }
}

.speed-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}
.speed-group { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; justify-content: center; }
.speed-label { font-size: 11px; color: var(--muted); margin-right: 2px; white-space: nowrap; }

.speed-btn {
  padding: 5px 9px;
  background: transparent;
  border: var(--border);
  border-radius: 5px;
  color: var(--muted);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all .15s;
}
.speed-btn:hover { border-color: var(--brown); color: var(--brown-dark); }
.speed-btn.active { background: var(--brown-dark); border-color: var(--brown-dark); color: var(--cream); font-weight: 500; }

/* AB loop bar */
.loop-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  flex-wrap: wrap;
}
.loop-bar-label { font-size: 11px; color: var(--muted); margin-right: 2px; white-space: nowrap; }

.loop-ab-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 11px;
  background: transparent;
  border: var(--border);
  border-radius: 7px;
  color: var(--brown-dark);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.loop-ab-btn:active { transform: scale(.94); }
.loop-ab-btn .ab-letter { font-weight: 700; font-size: 13px; }
.loop-ab-btn.set-a .ab-letter { color: var(--blue-mid); }
.loop-ab-btn.set-b .ab-letter { color: var(--danger); }
.loop-ab-btn .ab-time { font-variant-numeric: tabular-nums; color: var(--muted); font-size: 11px; }
.loop-ab-btn.set-a.has-point { background: var(--blue-light); border-color: var(--blue-mid); }
.loop-ab-btn.set-b.has-point { background: #fdecea; border-color: var(--danger); }
.loop-ab-btn.set-a.has-point .ab-time,
.loop-ab-btn.set-b.has-point .ab-time { color: var(--brown-dark); }

.loop-ab-btn.loop-go { color: var(--brown); font-weight: 500; }
.loop-ab-btn.loop-go.on { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-mid); }
.loop-ab-btn.loop-x { color: var(--muted); padding: 6px 9px; }
.loop-ab-btn.loop-x:hover { color: var(--danger); border-color: var(--danger); }

/* Side panel */
.side-panel {
  width: 240px;
  flex-shrink: 0;
  border-left: var(--border);
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 22px;
  background: var(--cream2);
}

.panel-section h3 {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: var(--border);
}

/* Toggle */
.toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
.toggle-label { font-size: 13px; color: var(--brown-dark); }
.toggle-desc  { font-size: 11px; color: var(--muted); margin-top: 1px; font-weight: 300; font-style: italic; }
.toggle { position: relative; width: 38px; height: 21px; flex-shrink: 0; }
.toggle input { display: none; }
.toggle-track {
  position: absolute; inset: 0;
  background: var(--tan-light);
  border-radius: 11px;
  border: var(--border);
  cursor: pointer;
  transition: background .2s, border-color .2s;
}
.toggle-thumb {
  position: absolute;
  top: 3px; left: 3px;
  width: 13px; height: 13px;
  border-radius: 50%;
  background: var(--tan);
  transition: left .2s, background .2s;
  pointer-events: none;
}
.toggle input:checked ~ .toggle-track { background: var(--blue-light); border-color: var(--blue-mid); }
.toggle input:checked ~ .toggle-track .toggle-thumb { left: 20px; background: var(--blue-mid); }

/* Loop */
.loop-controls { display: flex; flex-direction: column; gap: 8px; }
.loop-row { display: flex; align-items: center; gap: 7px; }
.loop-tag {
  font-size: 10px; font-weight: 600; letter-spacing: .5px;
  width: 24px; text-align: center;
  padding: 2px 4px; border-radius: 3px; flex-shrink: 0;
}
.loop-tag.in  { background: var(--blue-light); color: var(--blue-mid); }
.loop-tag.out { background: #fdecea; color: var(--danger); }

.time-input {
  flex: 1;
  background: var(--cream);
  border: var(--border);
  border-radius: 5px;
  color: var(--brown-dark);
  font-size: 12px;
  font-family: var(--font-sans);
  padding: 5px 8px;
  font-variant-numeric: tabular-nums;
  outline: none;
  transition: border-color .15s;
  min-width: 0;
}
.time-input:focus { border-color: var(--blue-mid); }

.set-btn {
  padding: 5px 8px;
  background: var(--cream);
  border: var(--border);
  border-radius: 5px;
  color: var(--brown);
  font-size: 11px;
  cursor: pointer;
  white-space: nowrap;
  transition: all .15s;
  font-family: var(--font-sans);
}
.set-btn:hover { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-mid); }

.loop-btn-row { display: flex; gap: 6px; margin-top: 2px; }

.loop-toggle-btn {
  flex: 1;
  padding: 7px 10px;
  background: var(--cream);
  border: var(--border);
  border-radius: 6px;
  color: var(--brown);
  font-size: 12px;
  font-family: var(--font-sans);
  cursor: pointer;
  text-align: center;
  transition: all .15s;
}
.loop-toggle-btn:hover { background: var(--blue-light); border-color: var(--blue-mid); }
.loop-toggle-btn.on { background: var(--blue-light); border-color: var(--blue-mid); color: var(--blue-mid); font-weight: 500; }

.loop-clear-btn {
  padding: 7px 10px;

  border: var(--border);
  border-radius: 6px;

.loop-clear-btn:hover { color: var(--danger); border-color: var(--danger); }

/* Stats */
.stat-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid var(--tan-light); font-size: 12px; }
.stat-row:last-child { border-bottom: none; }

/* Keys */

   STATE & STORAGE
══════════════════════════════════════ */
let projects = [];
let currentProject = null;
let currentFileURL  = null;
const STORAGE_KEY = 'pawse-projects';

function saveProjects() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(projects.map(p => ({ id:p.id, name:p.name, lastOpened:p.lastOpened })))); } catch(e) {}
}
function loadProjects() {
  try { const r = localStorage.getItem(STORAGE_KEY); if (r) projects = JSON.parse(r); } catch(e) { projects = []; }
}

/* ── IndexedDB: stores actual video files (Blobs) so routines persist ── */
const DB_NAME = 'pawse-db';
const DB_STORE = 'videos';
let _dbPromise = null;

function openDB() {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, 1);
    req.onupgradeneeded = () => {
      const db = req.result;
      if (!db.objectStoreNames.contains(DB_STORE)) db.createObjectStore(DB_STORE);
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
  return _dbPromise;
}

async function saveVideo(id, blob) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(blob, id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function getVideo(id) {
  const db = await openDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror = () => reject(req.error);
  });
}

async function deleteVideo(id) {
  const db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete(id);
    tx.oncomplete = () => resolve();
    tx.onerror = () => resolve();
  });
}

/* ══════════════════════════════════════

function renderHome() {
  const emptyState   = document.getElementById('empty-state');
  const projListWrap = document.getElementById('project-list-wrap');
  const projList     = document.getElementById('project-list');

  if (projects.length === 0) {
    emptyState.style.display   = 'flex';
    projListWrap.style.display = 'none';
    return;
  }
  emptyState.style.display   = 'none';
  projListWrap.style.display = 'block';
  projList.innerHTML = '';

  const sorted = [...projects].sort((a,b) => (b.lastOpened||0) - (a.lastOpened||0));
  sorted.forEach(proj => {
    const item = document.createElement('div');
    item.className = 'project-item';
    item.dataset.id = proj.id;
    const dateStr = proj.lastOpened
      ? new Date(proj.lastOpened).toLocaleDateString(lang === 'zh' ? 'zh-CN' : 'en-US', { month:'short', day:'numeric', year:'numeric' })
      : t().neverOpened;
    item.innerHTML = `
      <div class="project-thumb">🎬</div>
      <div class="project-info">
        <div class="project-name" data-name="${proj.id}">${proj.name}</div>
        <div class="project-meta">${dateStr}</div>
      </div>
      <div class="project-actions" onclick="event.stopPropagation()">
        <button class="icon-btn" onclick="startRename('${proj.id}')">✏️</button>
        <button class="icon-btn danger" onclick="deleteProject('${proj.id}')">🗑</button>
      </div>
    `;
    item.addEventListener('click', () => openProject(proj.id));
    projList.appendChild(item);
  });
}

function startRename(id) {
  const nameEl = document.querySelector(`[data-name="${id}"]`);
  if (!nameEl) return;
  const proj = projects.find(p => p.id === id);
  const input = document.createElement('input');
  input.className = 'project-name-input';
  input.value = proj.name;
  input.placeholder = t().renamePH;
  nameEl.replaceWith(input);
  input.focus(); input.select();
  function commit() {
    proj.name = input.value.trim() || proj.name;
    saveProjects(); renderHome();
  }
  input.addEventListener('blur', commit);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter')  { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') { input.value = proj.name; input.blur(); }
  });
}

function deleteProject(id) {
  projects = projects.filter(p => p.id !== id);
  saveProjects();
  deleteVideo(id);
  renderHome();
  showToast(t().toastDeleted);
}

async function openProject(id) {
  const proj = projects.find(p => p.id === id);
  if (!proj) return;
  currentProject = proj;
  document.getElementById('player-title').textContent = proj.name;

  // Try to load the stored video first
  let blob = null;
  try { blob = await getVideo(id); } catch(e) {}

  if (blob) {
    proj.lastOpened = Date.now();
    saveProjects();
    loadVideoFile(blob);
  } else {
    // Video missing (e.g. cleared by browser) — ask user to re-link
    showToast(t().toastReselect);
    fileInput.dataset.mode = 'relink';
    fileInput.dataset.relinkId = id;
    fileInput.click();
  }
}

    const id = fileInput.dataset.relinkId;

    if (proj) {
      proj.lastOpened = Date.now();
      currentProject = proj;
      document.getElementById('player-title').textContent = proj.name;
      loadVideoFile(file);
      saveVideo(id, file).catch(() => {});

      loadVideoFile(file);

  } else {

/* ══════════════════════════════════════
   VIDEO
══════════════════════════════════════ */
const vid    = document.getElementById('vid');
const canvas = document.getElementById('render-canvas');
const ctx    = canvas.getContext('2d');
let rafId    = null;

const ps = { mirrored:false, speed:1, loopIn:null, loopOut:null, loopActive:false, duration:0, draggingHandle:null, scrubbing:false };

function loadVideoFile(file) {
  if (currentFileURL) URL.revokeObjectURL(currentFileURL);
  currentFileURL = URL.createObjectURL(file);

  // ── Reset everything to a clean state for the new video ──
  ps.duration = 0;
  ps.loopIn = ps.loopOut = null;
  ps.loopActive = false;
  ps.scrubbing = false;
  ps.draggingHandle = null;
  // timeline visuals back to start
  document.getElementById('tl-played').style.width   = '0%';
  document.getElementById('tl-buffered').style.width = '0%';
  document.getElementById('scrub-handle').style.left = '0%';
  document.getElementById('time-current').textContent = '0:00';
  document.getElementById('time-total').textContent   = '0:00';
  // loop UI
  hideLoopZone();
  document.getElementById('loop-in-input').value  = '';
  document.getElementById('loop-out-input').value = '';
  document.getElementById('loop-badge').classList.remove('show');
  const lt = document.getElementById('btn-loop-toggle');
  document.getElementById('loop-go-text').textContent = t().startLoop;
  lt.classList.remove('on');
  document.getElementById('loop-in-time').textContent  = '—';
  document.getElementById('loop-out-time').textContent = '—';
  document.getElementById('btn-set-in').classList.remove('has-point');
  document.getElementById('btn-set-out').classList.remove('has-point');
  // play icon back to "play"
  setPlayIcon(false);
  // reset speed to 1×
  ps.speed = 1;
  vid.playbackRate = 1;
  document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b.dataset.speed === '1'));
  document.getElementById('si-speed').textContent = '1×';
  document.getElementById('trig-speed-text').textContent = '1×';

  // Show player UI immediately
  goToPlayer();
  canvas.style.display = 'none';        // canvas no longer used for display
  vid.classList.add('native-visible');  // show the real <video> element
  document.getElementById('timeline-wrap').style.display = 'flex';
  document.getElementById('video-wrap').classList.add('has-video');
  document.getElementById('tool-row').style.display      = 'flex';
  document.getElementById('speed-row').style.display     = 'none';
  document.getElementById('loop-bar').style.display      = 'none';
  document.getElementById('trig-speed').classList.remove('open');
  document.getElementById('trig-loop').classList.remove('open');

  // Show loading dog + progress bar
  const ls = document.getElementById('load-status');
  ls.className = 'show';
  ls.innerHTML = `<div class="ls-dog">🐶</div><div>${t().loadingVideo}</div><div class="ls-bar indeterminate"><div class="ls-bar-fill"></div></div>`;

  vid.src = currentFileURL;
  vid.load();
  applyMirrorClass();

  // Update progress bar as the video buffers
  function updateProgress() {
    if (initialised) return;
    const bar = ls.querySelector('.ls-bar');
    const fill = ls.querySelector('.ls-bar-fill');
    if (!bar || !fill) return;
    try {
      if (vid.duration && vid.buffered.length) {
        const pct = Math.min(100, (vid.buffered.end(vid.buffered.length-1) / vid.duration) * 100);
        if (pct > 1) {
          bar.classList.remove('indeterminate');
          fill.style.width = pct + '%';
        }
      }
    } catch(e) {}
  }
  vid.addEventListener('progress', updateProgress);
  vid.addEventListener('loadedmetadata', updateProgress);

  let initialised = false;
  function onReady() {
    if (initialised) return;
    if (!isFinite(vid.duration) || vid.duration === 0) return; // not ready yet
    initialised = true;
    clearTimeout(stuckTimer);
    document.getElementById('load-status').className = ''; // hide
    ps.duration = vid.duration;
    try { vid.currentTime = 0; } catch(e) {}   // always start from the beginning
    document.getElementById('time-total').textContent = fmtShort(vid.duration);
    document.getElementById('si-dur').textContent     = fmtShort(vid.duration);
    document.getElementById('si-res').textContent     = (vid.videoWidth && vid.videoHeight) ? `${vid.videoWidth}×${vid.videoHeight}` : '—';
    updateTimeline();
    showToast(t().toastLoaded);
  }

  vid.addEventListener('loadedmetadata', onReady);
  vid.addEventListener('loadeddata',     onReady);
  vid.addEventListener('canplay',        onReady);
  // Real error (truly unsupported / corrupt file)
  vid.addEventListener('error', () => {
    if (initialised) return;
    clearTimeout(stuckTimer);
    const ls = document.getElementById('load-status');
    ls.className = 'show';
    ls.innerHTML = `<div>${t().loadError}</div><div class="ls-hint">${t().loadErrorHint}</div>`;
  }, { once:true });
  // Stuck hint
  const stuckTimer = setTimeout(() => {
    if (initialised) return;
    const ls = document.getElementById('load-status');
    ls.className = 'show';
    ls.innerHTML = `<div class="ls-dog">🐶</div><div>${t().loadStuck}</div><div class="ls-bar indeterminate"><div class="ls-bar-fill"></div></div><div class="ls-hint">${t().loadStuckHint}</div>`;
  }, 4000);
  // Last-resort poll
  let tries = 0;
  const poll = setInterval(() => {
    if (initialised || tries++ > 60) { clearInterval(poll); return; }
    onReady();
  }, 100);
}

// Canvas display removed — native <video> handles display now.
// These stubs keep existing call sites working without change.
function drawFrame() {}
function renderOnce() {}
function renderLoop() {}

// Mirror via CSS transform on the native video element
function applyMirrorClass() {
  vid.classList.toggle('native-mirrored', ps.mirrored);
}

/* Timeline */
const tlTrack    = document.getElementById('tl-track');
const tlPlayed   = document.getElementById('tl-played');
const tlBuffered = document.getElementById('tl-buffered');
const loopZone   = document.getElementById('loop-zone');
const scrubHandle = document.getElementById('scrub-handle');
const loopInH    = document.getElementById('loop-in-handle');
const loopOutH   = document.getElementById('loop-out-handle');

function timeToPct(t) { return ps.duration > 0 ? (t/ps.duration)*100 : 0; }
function posToTime(x) { const r = tlTrack.getBoundingClientRect(); return Math.max(0,Math.min(1,(x-r.left)/r.width))*ps.duration; }

function updateTimeline() {
  const pct = timeToPct(vid.currentTime);
  tlPlayed.style.width = pct+'%';
  scrubHandle.style.left = pct+'%';
  document.getElementById('time-current').textContent = fmtShort(vid.currentTime);
  if (vid.buffered.length > 0) tlBuffered.style.width = timeToPct(vid.buffered.end(vid.buffered.length-1))+'%';
}

function updateLoopZone() {
  const inn = ps.loopIn??0, out = ps.loopOut??ps.duration;
  const l = timeToPct(inn), w = timeToPct(out)-l;
  loopZone.style.left  = l + '%';
  loopZone.style.width = w + '%';
  loopZone.style.display = 'block';
  loopInH.style.left  = l + '%';
  loopOutH.style.left = (l + w) + '%';
  loopInH.classList.add('show');
  loopOutH.classList.add('show');
}

function hideLoopZone() {
  loopZone.style.display = 'none';
  loopInH.classList.remove('show');
  loopOutH.classList.remove('show');
}

// Show A/B handles at default positions (for dragging before points are set)
function showLoopHandlesDefault() {
  if (ps.loopIn == null)  ps.loopIn  = 0;
  if (ps.loopOut == null) ps.loopOut = ps.duration;
  applyLoop();
}

vid.addEventListener('timeupdate', () => {
  updateTimeline();
  if (ps.loopActive && ps.loopIn != null) {
    const out = ps.loopOut ?? ps.duration;
    if (vid.currentTime >= out) vid.currentTime = ps.loopIn;
  }
});

/* Scrubbing */
function startDrag(type, e) { e.preventDefault(); ps.draggingHandle = type; }
scrubHandle.addEventListener('mousedown', e => startDrag('scrub', e));
loopInH.addEventListener('mousedown',     e => startDrag('loopIn', e));
loopOutH.addEventListener('mousedown',    e => startDrag('loopOut', e));
scrubHandle.addEventListener('touchstart', e => startDrag('scrub', e), {passive:false});
loopInH.addEventListener('touchstart',     e => startDrag('loopIn', e), {passive:false});
loopOutH.addEventListener('touchstart',    e => startDrag('loopOut', e), {passive:false});

tlTrack.addEventListener('click', e => { if (!ps.duration) return; vid.currentTime = posToTime(e.clientX); updateTimeline(); renderOnce(); });

function onDragMove(x) {
  const t = posToTime(x);
  if (ps.draggingHandle === 'scrub') { vid.currentTime = t; ps.scrubbing = true; updateTimeline(); renderOnce(); }
  else if (ps.draggingHandle === 'loopIn')  {
    ps.loopIn = Math.max(0, Math.min(t,(ps.loopOut??ps.duration)-0.1));
    vid.currentTime = ps.loopIn;       // preview the frame at A
    applyLoop();
  }
  else if (ps.draggingHandle === 'loopOut') {
    ps.loopOut = Math.min(ps.duration, Math.max(t,(ps.loopIn??0)+0.1));
    vid.currentTime = ps.loopOut;      // preview the frame at B
    applyLoop();
  }
}

document.addEventListener('mousemove', e => { if (ps.draggingHandle) onDragMove(e.clientX); });
document.addEventListener('touchmove', e => { if (ps.draggingHandle) onDragMove(e.touches[0].clientX); }, {passive:false});
document.addEventListener('mouseup',   () => { ps.draggingHandle = null; ps.scrubbing = false; });
document.addEventListener('touchend',  () => { ps.draggingHandle = null; ps.scrubbing = false; });

/* Playback controls */
const btnPlay   = document.getElementById('btn-play');
const btnMirror = document.getElementById('btn-mirror');
const toggleMirror = document.getElementById('toggle-mirror');
const iconPlay  = btnPlay.querySelector('.icon-play');
const iconPause = btnPlay.querySelector('.icon-pause');

function setPlayIcon(playing) {
  iconPlay.style.display  = playing ? 'none' : 'block';
  iconPause.style.display = playing ? 'block' : 'none';
  const vw = document.getElementById('video-wrap');
  vw.classList.toggle('playing', playing);
  if (playing) {
    // auto-hide controls shortly after playback starts
    clearTimeout(vw._hideT);
    vw._hideT = setTimeout(() => { if (!vid.paused) vw.classList.add('controls-hidden'); }, 1400);
  } else {
    clearTimeout(vw._hideT);
    vw.classList.remove('controls-hidden');
  }
}

function togglePlay() {
  if (vid.paused) { vid.play(); setPlayIcon(true); }
  else { vid.pause(); setPlayIcon(false); renderOnce(); }
}

btnPlay.addEventListener('click', (e) => { e.stopPropagation(); togglePlay(); });
vid.addEventListener('ended', () => { setPlayIcon(false); renderOnce(); });

/* Fullscreen */
const btnFullscreen = document.getElementById('btn-fullscreen');
const videoWrap = document.getElementById('video-wrap');

function toggleFullscreen() {
  // Already in CSS fullscreen → exit it
  if (videoWrap.classList.contains('css-fullscreen')) { cssFullscreen(); return; }
  // Already in real fullscreen → exit it
  if (document.fullscreenElement || document.webkitFullscreenElement) {
    if (document.exitFullscreen) document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
    return;
  }

  // Mirror ON → must use CSS pseudo-fullscreen to keep the flip working
  if (ps.mirrored) {
    showToast(t().fsMirrorNote, 3800);
    cssFullscreen();
    return;
  }

  // Mirror OFF → use real/native fullscreen for a true immersive view
  if (videoWrap.requestFullscreen) {
    videoWrap.requestFullscreen().catch(() => cssFullscreen());
  } else if (videoWrap.webkitRequestFullscreen) {
    videoWrap.webkitRequestFullscreen();
  } else if (vid.webkitEnterFullscreen) {
    // iPhone Safari: only the <video> element can go truly fullscreen
    // (this gives real fullscreen + auto-rotate + pinch-zoom)
    vid.webkitEnterFullscreen();
  } else {
    cssFullscreen();
  }
}

function cssFullscreen() {
  const on = videoWrap.classList.toggle('css-fullscreen');
  document.body.classList.toggle('fs-lock', on);
}

btnFullscreen.addEventListener('click', toggleFullscreen);
// Sync play/pause icon when iOS native fullscreen closes
vid.addEventListener('webkitendfullscreen', () => { setPlayIcon(!vid.paused); });
vid.addEventListener('webkitbeginfullscreen', () => { setPlayIcon(!vid.paused); });
document.getElementById('fs-exit').addEventListener('click', () => {
  if (videoWrap.classList.contains('css-fullscreen')) cssFullscreen();
  else if (document.fullscreenElement) document.exitFullscreen();
});
// Tap the video area: toggle play/pause (and reveal controls if hidden)
videoWrap.addEventListener('click', e => {
  if (e.target.closest('.fs-exit')) return;
  if (e.target.closest('.overlay-tools')) return;
  if (e.target.closest('.overlay-play')) return; // handled by its own listener
  if (e.target.closest('.timeline-wrap')) return; // don't toggle when using the scrubber
  if (!ps.duration) return;
  // If controls are hidden mid-play, first tap just reveals them
  if (videoWrap.classList.contains('controls-hidden')) {
    videoWrap.classList.remove('controls-hidden');
    return;
  }
  togglePlay();
});
// Exit CSS fullscreen on Escape (desktop) — harmless on mobile
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && videoWrap.classList.contains('css-fullscreen')) cssFullscreen();
});

function setMirror(on) {
  ps.mirrored = on;
  toggleMirror.checked = on;
  btnMirror.classList.toggle('active', on);
  applyMirrorClass();
  showToast(on ? t().toastMirrorOn : t().toastMirrorOff);
}
btnMirror.addEventListener('click', () => setMirror(!ps.mirrored));
toggleMirror.addEventListener('change', () => setMirror(toggleMirror.checked));

document.querySelectorAll('.speed-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const sp = parseFloat(btn.dataset.speed);
    vid.playbackRate = sp; ps.speed = sp;
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.toggle('active', b===btn));
    document.getElementById('si-speed').textContent = sp+'×';
    document.getElementById('trig-speed-text').textContent = sp+'×';
    showToast(t().toastSpeed(sp));
    closePops(); // collapse after picking
  });
});

/* Tool popovers (speed / loop) */
const trigSpeed = document.getElementById('trig-speed');
const trigLoop  = document.getElementById('trig-loop');
const speedPop  = document.getElementById('speed-row');
const loopPop   = document.getElementById('loop-bar');

function closePops() {
  speedPop.style.display = 'none';
  loopPop.style.display  = 'none';
  trigSpeed.classList.remove('open');
  trigLoop.classList.remove('open');
}
function togglePop(which) {
  const openSpeed = which === 'speed' && speedPop.style.display === 'none';
  const openLoop  = which === 'loop'  && loopPop.style.display  === 'none';
  closePops();
  if (openSpeed) { speedPop.style.display = 'flex'; trigSpeed.classList.add('open'); }
  if (openLoop)  {
    loopPop.style.display = 'flex';
    trigLoop.classList.add('open');
    // Show A/B handles right away so they can be dragged to set points
    if (ps.duration) showLoopHandlesDefault();
  }
}
trigSpeed.addEventListener('click', () => togglePop('speed'));
trigLoop.addEventListener('click',  () => togglePop('loop'));

/* Loop */
function applyLoop() {
  // hidden inputs (kept for compatibility)
  document.getElementById('loop-in-input').value  = ps.loopIn  != null ? fmt(ps.loopIn)  : '';
  document.getElementById('loop-out-input').value = ps.loopOut != null ? fmt(ps.loopOut) : '';

  // AB loop bar buttons
  const aBtn = document.getElementById('btn-set-in');
  const bBtn = document.getElementById('btn-set-out');
  document.getElementById('loop-in-time').textContent  = ps.loopIn  != null ? fmt(ps.loopIn)  : '—';
  document.getElementById('loop-out-time').textContent = ps.loopOut != null ? fmt(ps.loopOut) : '—';
  aBtn.classList.toggle('has-point', ps.loopIn  != null);
  bBtn.classList.toggle('has-point', ps.loopOut != null);

  if (ps.loopIn != null || ps.loopOut != null) updateLoopZone(); else hideLoopZone();

  const on = ps.loopActive && ps.loopIn != null;
  document.getElementById('loop-badge').classList.toggle('show', on);
  document.getElementById('loop-badge').textContent = t().loopBadge;
  const lt = document.getElementById('btn-loop-toggle');
  lt.classList.toggle('on', on);
  document.getElementById('loop-go-text').textContent = on ? t().stopLoop : t().startLoop;
  // Reflect state on the collapsed trigger button
  const trigLoopText = document.getElementById('trig-loop-text');
  const trigLoopBtn  = document.getElementById('trig-loop');
  if (trigLoopText) {
    trigLoopText.textContent = on ? 'on' : 'A–B';
    trigLoopBtn.classList.toggle('loop-active', on);
  }
}

document.getElementById('btn-set-in').addEventListener('click', () => {
  ps.loopIn = vid.currentTime;
  if (ps.loopOut != null && ps.loopOut <= ps.loopIn) ps.loopOut = null;
  applyLoop(); showToast(t().toastInPoint(fmt(ps.loopIn)));
});

document.getElementById('btn-set-out').addEventListener('click', () => {
  if (ps.loopIn == null) { showToast(t().toastNeedIn); return; }
  if (vid.currentTime <= ps.loopIn) { showToast(t().toastOutBefore); return; }
  ps.loopOut = vid.currentTime;
  applyLoop(); showToast(t().toastOutPoint(fmt(ps.loopOut)));
});

document.getElementById('btn-loop-toggle').addEventListener('click', () => {
  if (ps.loopIn == null) { showToast(t().toastNeedInOut); return; }
  ps.loopActive = !ps.loopActive;
  if (ps.loopActive) { vid.currentTime = ps.loopIn; if (vid.paused) togglePlay(); }
  applyLoop(); showToast(ps.loopActive ? t().toastLoopOn : t().toastLoopOff);
});

document.getElementById('btn-loop-clear').addEventListener('click', () => {
  ps.loopIn = ps.loopOut = null; ps.loopActive = false;
  applyLoop(); hideLoopZone(); showToast(t().toastLoopClear);
});

/* Keyboard */
document.addEventListener('keydown', e => {
  if (document.activeElement.tagName.toLowerCase() === 'input') return;
  if (document.getElementById('screen-player').classList.contains('hidden')) return;
  switch(e.key) {
    case ' ':          e.preventDefault(); if (ps.duration) togglePlay(); break;
    case 'ArrowLeft':  e.preventDefault(); vid.currentTime = Math.max(0, vid.currentTime-5); renderOnce(); break;
    case 'ArrowRight': e.preventDefault(); vid.currentTime = Math.min(ps.duration, vid.currentTime+5); renderOnce(); break;
    case 'm': case 'M': setMirror(!ps.mirrored); break;
    case 'i': case 'I': if (ps.duration) document.getElementById('btn-set-in').click(); break;
    case 'o': case 'O': if (ps.duration) document.getElementById('btn-set-out').click(); break;
    case 'l': case 'L': if (ps.duration) document.getElementById('btn-loop-toggle').click(); break;
  }
});

/* Resize */
new ResizeObserver(() => { if (ps.duration) renderOnce(); }).observe(document.getElementById('video-wrap'));

/* Helpers */
function fmt(s) { if (!isFinite(s)) return '—'; const m=Math.floor(s/60),sec=s%60; return `${m}:${sec<10?'0':''}${sec.toFixed(1)}`; }
function fmtShort(s) { if (!isFinite(s)) return '0:00'; const m=Math.floor(s/60),sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
function showToast(msg, ms) { const el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'), ms || 2000); }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2); }

/* Init */
loadProjects();
applyI18n();

/* PWA service worker — only on https (skips file:// and preview to avoid errors) */

  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration skipped:', err));
  });
}
</script>
